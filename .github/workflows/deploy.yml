name: Deploy Project-10 to Azure VM

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy project to VM
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          source: "."
          target: ${{ secrets.SERVER_PATH }}
          rm: false

      - name: Deploy on VM
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            set -euo pipefail

            APP_DIR="${{ secrets.SERVER_PATH }}"
            BACKEND_DIR="$APP_DIR/backend"
            FRONTEND_DIR="$APP_DIR/frontend"
            PM2_APP_NAME="${{ secrets.PM2_APP_NAME }}"
            if [ -z "$PM2_APP_NAME" ]; then
              PM2_APP_NAME="project10"
            fi

            echo "=== Ensure directories ==="
            mkdir -p "$BACKEND_DIR/logs"

            echo "=== Write backend .env ==="
            DB_HOST="${{ secrets.DB_HOST }}"
            DB_PORT="${{ secrets.DB_PORT }}"
            DB_NAME="${{ secrets.DB_NAME }}"
            DB_USER="${{ secrets.DB_USER }}"
            DB_PASSWORD="${{ secrets.DB_PASSWORD }}"
            if [ -z "$DB_HOST" ]; then DB_HOST="localhost"; fi
            if [ -z "$DB_PORT" ]; then DB_PORT="5432"; fi

            if [ -n "${{ secrets.BACKEND_ENV }}" ]; then
              echo "Using BACKEND_ENV secret to overwrite backend/.env"
              printf '%s\n' "${{ secrets.BACKEND_ENV }}" > "$BACKEND_DIR/.env"
            elif [ -n "$DB_NAME" ] && [ -n "$DB_USER" ] && [ -n "$DB_PASSWORD" ] && [ -n "${{ secrets.DJANGO_SECRET_KEY }}" ]; then
              echo "Using discrete GitHub secrets to generate backend/.env"
              {
                printf '%s\n' "DJANGO_SECRET_KEY=${{ secrets.DJANGO_SECRET_KEY }}"
                printf '%s\n' "DJANGO_DEBUG=False"
                printf '%s\n' "DJANGO_ALLOWED_HOSTS=98.70.29.114 autoinvestapi.duckdns.org autoinvest.duckdns.org localhost 127.0.0.1"
                printf '%s\n' "CORS_ALLOWED_ORIGINS=https://autoinvest.duckdns.org https://autoinvestapi.duckdns.org http://localhost:5173"
                printf '%s\n' "CORS_ALLOW_ALL_ORIGINS=True"
                printf '%s\n' "DB_NAME=$DB_NAME"
                printf '%s\n' "DB_USER=$DB_USER"
                printf '%s\n' "DB_PASSWORD=$DB_PASSWORD"
                printf '%s\n' "DB_HOST=$DB_HOST"
                printf '%s\n' "DB_PORT=$DB_PORT"
              } > "$BACKEND_DIR/.env"
            elif [ -f "$BACKEND_DIR/.env" ]; then
              echo "DB secrets are incomplete. Keeping existing backend/.env on VM."
            else
              echo "ERROR: No backend/.env on VM and no complete DB secrets provided."
              echo "Set BACKEND_ENV or set DJANGO_SECRET_KEY + DB_NAME + DB_USER + DB_PASSWORD secrets."
              exit 1
            fi

            echo "=== Backend: create venv (if needed) + install deps ==="
            cd "$BACKEND_DIR"
            if [ ! -d "venv" ]; then
              python3 -m venv venv
            fi
            venv/bin/pip install --upgrade pip setuptools wheel --quiet
            venv/bin/pip install -r requirements-prod.txt --quiet

            echo "=== Backend: migrate + collectstatic ==="
            venv/bin/python manage.py migrate --noinput
            venv/bin/python manage.py collectstatic --noinput

            echo "=== Frontend: write .env + build ==="
            cd "$FRONTEND_DIR"
            echo "VITE_API_BASE_URL=https://autoinvestapi.duckdns.org/api/" > .env
            if [ -f package-lock.json ]; then
              npm ci --silent
            else
              npm install --silent
            fi
            npm run build

            echo "=== Restart app ==="
            chmod +x "$APP_DIR/deploy/rungunicorn.sh"
            APP_DIR="$APP_DIR" SOCKET_PATH="$BACKEND_DIR/project10.sock" pm2 restart "$PM2_APP_NAME" --update-env || \
            APP_DIR="$APP_DIR" SOCKET_PATH="$BACKEND_DIR/project10.sock" pm2 start "$APP_DIR/deploy/rungunicorn.sh" --name "$PM2_APP_NAME"
            pm2 save
            sudo systemctl restart nginx

            echo "Deployment complete."
